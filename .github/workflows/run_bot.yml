name: BIST Otomatik Analiz Motoru

on:
  schedule:
    # Hafta içi (Pzt–Cuma) her saat başı. GitHub UTC kullanır:
    # TR 10:00–17:00 = UTC 07:00–14:00
    - cron: '0 7-14 * * 1-5'
  workflow_dispatch: # Web arayüzünden manuel "Run workflow" butonu

# sent_state.json'u repoya geri yazabilmek için yazma izni
permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Istanbul   # Tarih/saat damgaları Türkiye saatiyle olsun
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
    - name: Repo Kodlarını Çek
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: pip
        cache-dependency-path: borsa_analiz/requirements.txt

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r borsa_analiz/requirements.txt

    - name: Analiz Algoritmasını Tetikle
      run: |
        cd borsa_analiz
        python main.py --once

    - name: Sinyal Hafızasını Kaydet
      # sent_state.json değiştiyse repoya geri yaz ki bir sonraki çalıştırma
      # aynı sinyali tekrar göndermesin. [skip ci] sonsuz döngüyü önler.
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add borsa_analiz/sent_state.json
        if git diff --staged --quiet; then
          echo "Hafızada değişiklik yok."
        else
          git commit -m "Sinyal hafızası güncellendi [skip ci]"
          git push
        fi
