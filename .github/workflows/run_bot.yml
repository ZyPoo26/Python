name: BIST Otomatik Analiz Motoru

on:
  schedule:
    # Her gün TSİ (Türkiye Saati) 10:15'te otomatik tetiklenir (UTC 07:15)
    - cron: '15 7 * * *'
  workflow_dispatch: # Web arayüzünden manuel "Butona Bas çalıştır" özelliğini açar

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
    - name: Repo Kodlarını Çek
      uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install yfinance requests beautifulsoup4 pandas

    - name: Analiz Algoritmasını Tetikle
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        cd borsa_analiz
        python main.py
